name: FinGuard CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: finguard
          POSTGRES_PASSWORD: finguard123
          POSTGRES_DB: test_finguard_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4
    
    - name: Generate badges
      uses: emibcn/badge-action@v2.0.2
      with:
        name: 'Build'
        value: 'passing'
        color: 'brightgreen'
        path: '.github/badges/build.svg'
        
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Tests & Build Coverage
      env:
        DATABASE_URL: postgresql+asyncpg://finguard:finguard123@localhost:5432/test_finguard_db
        TEST_DATABASE_URL: postgresql+asyncpg://finguard:finguard123@localhost:5432/test_finguard_db
        REDIS_URL: redis://localhost:6379/0
        JWT_SECRET: testing_secret
        PROMETHEUS_ENABLED: "false"
        MLFLOW_TRACKING_URI: "sqlite:///mlruns.db"
      run: |
        pytest -v --cov=backend --cov-report=xml
        
    - name: Upload Coverage
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

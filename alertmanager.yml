global:
  resolve_timeout: 5m

route:
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'web.hook'

receivers:
  - name: 'web.hook'
    webhook_configs:
      # Just pointing to localhost for demonstration of "console" or dummy
      - url: 'http://127.0.0.1:9093/-'

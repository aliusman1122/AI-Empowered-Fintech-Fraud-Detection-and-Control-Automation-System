global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - 'prometheus_rules.yml'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'

scrape_configs:
  - job_name: 'finguard_backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend:8000']

  - job_name: 'finguard_mlflow'
    scrape_interval: 30s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['mlflow:5000']
